name: Validate Marketplace

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout marketplace source
        uses: actions/checkout@v4
        with:
          path: marketplace

      - name: Checkout protocol source
        uses: actions/checkout@v4
        with:
          repository: op-agent/opagent-protocol
          path: opagent-protocol

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: marketplace/go.mod
          cache-dependency-path: marketplace/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            marketplace/agents/claude-code/package-lock.json
            opagent-protocol/ts-sdk/package-lock.json

      - name: Validate structure and public-safe content
        shell: bash
        run: |
          set -euo pipefail
          cd marketplace

          required_files=(
            README.md
            go.mod
            agents/claude-code/AGENT.md
            agents/claude-code/bin/claude-code
            agents/claude-code/cmd/claude-code/main.go
            agents/claude-code/package.json
            agents/claude-code/package-lock.json
            agents/claude-code/src/main.ts
            agents/claude-code/src/claude.ts
            agents/claude-code/src/claudeEvents.ts
            agents/claude-code/src/config.ts
            agents/claude-code/tsconfig.json
            agents/completion/AGENT.md
            agents/opagent/AGENT.md
            agents/opagent/cmd/opagent/main.go
            agents/researcher/AGENT.md
            agents/researcher/cmd/researcher/main.go
            agents/researcher/tools/research-tools/TOOLS.md
            agents/researcher/tools/research-tools/main.go
            agents/researcher/tools/research-tools/service.go
            skills/plan/SKILL.md
            skills/execute-plan/SKILL.md
            skills/skill-creator/SKILL.md
            skills/agent-browser-search/SKILL.md
            tools/rg-search/TOOLS.md
            tools/rg-search/cmd/main.go
          )

          for file in "${required_files[@]}"; do
            [[ -f "$file" ]] || { echo "missing required file: $file" >&2; exit 1; }
          done

          [[ ! -e tools/systools ]] || { echo "systools must not be part of marketplace; it is bundled with runtime" >&2; exit 1; }
          [[ ! -e AGENTS.md ]] || { echo "AGENTS.md must not be committed to the public marketplace repo" >&2; exit 1; }
          [[ ! -d scripts ]] || { echo "internal build/release scripts must not be committed to the public marketplace repo" >&2; exit 1; }
          [[ ! -d internal ]] || { echo "shared internal packages must not be committed; helpers should live beside the agent/tool that uses them" >&2; exit 1; }
          if grep -nE '\("agent",[[:space:]]*"claude-code"\)' .github/workflows/publish.yml; then
            echo "claude-code must remain manual-install only; do not publish it as a builtin item" >&2
            exit 1
          fi

          if grep -RInE '(/Users/|/root/|opjp01|opagent-dev|OPAGENT_DEV|\.zshrc|keychain|notary|BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY|PASSWORD=|SECRET=)' \
            --exclude-dir=.git \
            --exclude=validate.yml \
            .; then
            echo "possible private path, secret, or internal deployment detail found" >&2
            exit 1
          fi

          if grep -RInE '([0-9]{1,3}\.){3}[0-9]{1,3}' --include='*.go' --include='*.md' --include='*.json' . \
            | grep -v '127\.0\.0\.1' \
            | grep -v '.git/'; then
            echo "possible public IP address found" >&2
            exit 1
          fi

      - name: Test TypeScript packages
        shell: bash
        run: |
          set -euo pipefail
          cd opagent-protocol/ts-sdk
          npm ci --ignore-scripts --no-audit --no-fund
          npm run check

          cd ../../marketplace/agents/claude-code
          npm ci --install-links --ignore-scripts --no-audit --no-fund
          npm run check

      - name: Test Go packages
        shell: bash
        run: |
          set -euo pipefail
          cd marketplace
          go test ./...
